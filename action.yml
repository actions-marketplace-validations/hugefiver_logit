name: 'Logit GitHub Card'
description: 'Generate SVG profile cards from GitHub contribution statistics'

branding:
  icon: 'bar-chart-2'
  color: 'blue'

inputs:
  username:
    description: 'GitHub username'
    required: true
  token:
    description: 'GitHub token (PAT with read access)'
    default: ${{ github.token }}
  command:
    description: 'card or multi'
    default: 'card'
  days:
    description: 'Number of days to look back (card only)'
    default: '365'
  periods:
    description: 'Comma-separated periods for multi command (e.g. week,month,year)'
    default: 'week,month,year'
  include-forks:
    description: 'Include forked repositories'
    default: 'false'
  include-contributed:
    description: 'Include contributed repositories'
    default: 'false'
  include-private:
    description: 'Include token holder''s own private repositories (requires a PAT belonging to `username`; the default workflow token will not work)'
    default: 'false'
  exclude-lang:
    description: 'Comma-separated languages to exclude'
    default: ''
  exclude:
    description: |
      Multi-line exclusions. One rule per line.
      Format: REPO[:lang:LANG]
      Examples:
        my-repo
        my-repo:lang:markdown
        frontend,backend:lang:css
    default: ''
  short:
    description: 'Use compact card layout (card only)'
    default: 'false'
  lang-rows:
    description: 'Number of language rows (card only)'
    default: '2'
  title:
    description: 'Custom card title (card only)'
    default: ''
  output:
    description: 'Output SVG file path'
    default: 'profile-card.svg'
  retry-count:
    description: 'Number of retry attempts for the Generate SVG step'
    default: '3'
  retry-delay:
    description: 'Delay in seconds between retry attempts'
    default: '5'

outputs:
  svg-path:
    description: 'Path to the generated SVG file'
    value: ${{ inputs.output }}

runs:
  using: 'composite'
  steps:
    - uses: dtolnay/rust-toolchain@stable

    - name: Compute logit source hash
      id: srchash
      shell: bash
      run: |
        HASH=$(find "${{ github.action_path }}" -type f \( -name 'Cargo.toml' -o -name 'Cargo.lock' -o -name 'build.rs' -o -path '*/src/*' \) \
          -exec sha256sum {} \; | sort | sha256sum | cut -d' ' -f1)
        echo "hash=$HASH" >> "$GITHUB_OUTPUT"

    - uses: actions/cache@v6
      id: cache-logit
      with:
        path: ~/.cargo/bin/logit
        key: logit-${{ runner.os }}-${{ steps.srchash.outputs.hash }}
        restore-keys: |
          logit-${{ runner.os }}-

    - uses: actions/cache@v6
      with:
        path: ~/.cache/logit/github/
        key: logit-data-${{ inputs.username }}-${{ inputs.command }}-${{ inputs.days }}

    - name: Install logit
      if: steps.cache-logit.outputs.cache-hit != 'true'
      shell: bash
      run: cargo install --path "${{ github.action_path }}" --features github --force

    - name: Generate SVG
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        CMD="logit github ${{ inputs.command }}"

        if [ "${{ inputs.command }}" = "multi" ]; then
          CMD="$CMD ${{ inputs.username }} -p ${{ inputs.periods }}"
        else
          CMD="$CMD ${{ inputs.username }} -d ${{ inputs.days }}"
          if [ "${{ inputs.short }}" = "true" ]; then CMD="$CMD --short"; fi
          if [ -n "${{ inputs.lang-rows }}" ]; then CMD="$CMD --lang-rows ${{ inputs.lang-rows }}"; fi
          if [ -n "${{ inputs.title }}" ]; then CMD="$CMD --title '${{ inputs.title }}'"; fi
        fi

        if [ "${{ inputs.include-forks }}" = "true" ]; then CMD="$CMD --include-forks"; fi
        if [ "${{ inputs.include-contributed }}" = "true" ]; then CMD="$CMD --include-contributed"; fi
        if [ "${{ inputs.include-private }}" = "true" ]; then CMD="$CMD --include-private"; fi
        if [ -n "${{ inputs.exclude-lang }}" ]; then CMD="$CMD --exclude-lang ${{ inputs.exclude-lang }}"; fi
        if [ -n "${{ inputs.exclude }}" ]; then
          while IFS= read -r line; do
            line="$(echo "$line" | xargs)"
            if [ -n "$line" ]; then CMD="$CMD --exclude $line"; fi
          done <<< "${{ inputs.exclude }}"
        fi

        CMD="$CMD -o ${{ inputs.output }}"
        echo "Running: $CMD"

        MAX_RETRIES=${{ inputs.retry-count }}
        RETRY_DELAY=${{ inputs.retry-delay }}
        ATTEMPT=1

        while [ $ATTEMPT -le $MAX_RETRIES ]; do
          echo "::group::Attempt $ATTEMPT/$MAX_RETRIES"
          if eval $CMD; then
            echo "::endgroup::"
            echo "Succeeded on attempt $ATTEMPT"
            exit 0
          fi
          EXIT_CODE=$?
          echo "::endgroup::"
          if [ $ATTEMPT -lt $MAX_RETRIES ]; then
            echo "Attempt $ATTEMPT failed with exit code $EXIT_CODE. Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          else
            echo "All $MAX_RETRIES attempts failed. Last exit code: $EXIT_CODE"
            exit $EXIT_CODE
          fi
          ATTEMPT=$((ATTEMPT + 1))
        done
